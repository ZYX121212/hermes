version: "3.9"

services:
  # ── Qdrant Vector Database ──
  qdrant:
    image: qdrant/qdrant:v1.16
    container_name: hermess-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── Hermes Agent (HTTP Server + Gateway) ──
  hermes:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hermess-agent
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "9090:9090"
    depends_on:
      qdrant:
        condition: service_healthy
    volumes:
      - hermes_data:/home/hermes/.hermes
      - ./config:/home/hermes/config:ro
    environment:
      HERMES_QDRANT_URL: http://qdrant:6334
      HERMES_SERVE_PORT: "8080"
      HERMES_METRICS_PORT: "9090"
      RUST_LOG: info,hermes=debug
    command: ["--serve", "8080"]

  # ── Traefik Reverse Proxy (Production) ──
  traefik:
    image: traefik:v3.2
    container_name: hermess-traefik
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_certs:/letsencrypt
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.email=${LETSENCRYPT_EMAIL:-admin@example.com}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
    profiles:
      - production

volumes:
  qdrant_data:
  hermes_data:
  traefik_certs:
